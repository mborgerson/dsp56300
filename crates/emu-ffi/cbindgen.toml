# cbindgen configuration for dsp56300-emu-ffi

language = "C"
include_version = false
include_guard = "DSP56300_H"
style = "type"
cpp_compat = false

header = """/*
 * dsp56300 emulator C API (auto-generated by cbindgen)
 *
 * SPDX-License-Identifier: MIT
 */"""

no_includes = true
sys_includes = ["stdarg.h", "stdbool.h", "stdint.h"]

[export]
include = [
    "CReg",
    "CMemSpace",
    "CRegion",
    "CBufferRegion",
    "CCallbackRegion",
    "CRegionData",
    "CMemoryRegion",
    "CMemoryMap",
    "CCreateInfo",
    "CInterruptState",
    "CDspState",
]

[export.rename]
"DspJit" = "Dsp56300Jit"
"CReg" = "Dsp56300Reg"
"CMemSpace" = "Dsp56300MemSpace"
"CRegion" = "Dsp56300Region"
"CBufferRegion" = "Dsp56300BufferRegion"
"CCallbackRegion" = "Dsp56300CallbackRegion"
"CRegionData" = "Dsp56300RegionData"
"CMemoryRegion" = "Dsp56300MemoryRegion"
"CMemoryMap" = "Dsp56300MemoryMap"
"CCreateInfo" = "Dsp56300CreateInfo"
"CInterruptState" = "Dsp56300InterruptState"
"CDspState" = "Dsp56300State"

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"
